spring:
    application:
        name: shopping-mall

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.H2Dialect

    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password:

    h2:
        console:
        enabled: true

    sql:
        init:
            mode: always

server:
    port: 8080
    servlet:
        context-path: /api

jwt:
    secret: ${SECRET_KEY}
    expiration: 3600000
    refresh-expiration: 604800000