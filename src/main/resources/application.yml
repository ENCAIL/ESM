spring:
  datasource:
    url: ${MY_SQL_URL}
    username: ${MY_SQL_USER}
    password: ${MY_SQL_PW}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${SECRET_KEY}
  access-expiration: 3600000 # 1시간
  refresh-expiration: 604800000 # 7일
